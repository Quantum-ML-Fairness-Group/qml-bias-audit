name: QML Fairness Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test data loading (no network)
        run: |
          python -c "
          import numpy as np
          # Test fairness metrics with synthetic data
          import sys; sys.path.insert(0, '.')
          from utils.fairness_metrics import FairnessEvaluator
          np.random.seed(0)
          n = 200
          y = np.random.randint(0,2,n)
          y_pred = np.random.randint(0,2,n)
          groups = {'race': np.random.randint(0,2,n)}
          ev = FairnessEvaluator(y, y_pred, groups)
          rep = ev.evaluate_attribute('race')
          assert 0 <= rep.demographic_parity_diff <= 1
          print('Fairness metrics: OK')
          "

      - name: Smoke-test VQC-Angle (minimal)
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          import numpy as np
          from models.quantum.vqc_angle import VQCAngle
          n, d = 30, 3
          X = np.random.randn(n, d).astype('float32')
          y = np.random.randint(0, 2, n)
          m = VQCAngle(n_qubits=d, n_layers=1, n_epochs=3, batch_size=10)
          m.fit(X, y)
          preds = m.predict(X)
          assert preds.shape == (n,)
          print('VQC-Angle smoke test: OK')
          "

      - name: Smoke-test VQC-Amplitude (minimal)
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          import numpy as np
          from models.quantum.vqc_amplitude import VQCAmplitude
          n, d = 20, 4
          X = np.random.randn(n, d).astype('float32')
          y = np.random.randint(0, 2, n)
          m = VQCAmplitude(n_features=d, n_layers=1, n_epochs=2, batch_size=10)
          m.fit(X, y)
          print('VQC-Amplitude smoke test: OK')
          "

      - name: Smoke-test VQC-IQP (minimal)
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          import numpy as np
          from models.quantum.vqc_iqp import VQCIQP
          n, d = 20, 3
          X = np.random.randn(n, d).astype('float32')
          y = np.random.randint(0, 2, n)
          m = VQCIQP(n_qubits=d, n_layers=1, n_encoding_reps=1, n_epochs=2, batch_size=10)
          m.fit(X, y)
          print('VQC-IQP smoke test: OK')
          "
